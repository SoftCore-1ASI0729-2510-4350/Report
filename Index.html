<!DOCTYPE html>
<html lang="en">
<head>

  <title>CustomHost</title>
  <link rel="stylesheet" href="styles.css" />

      <div class="nav-contact">

        <div class="contact-item call">
          <span class="material-symbols-outlined">call</span>

          <span class="material-symbols-outlined">mail</span>
          <span>reservas@customhost.com</span>
        </div>

      </div>
    </div>
    
  
    <!-- Main Navigation -->
    <div class="nav-main">
      <div class="logo">
        <img src="Assets/img/Index/LightLogo.png" alt="CustomHost Logo" />
      </div>
  
      <nav class="nav-links">
        <a href="#">Home ▾</a>
        <a href="#">SmartStay</a>
        <a href="#">About Us</a>
        <a href="#">Contact Us</a>
      </nav>
  
      <div class="nav-actions">
        <button class="btn-login">Log In</button>
        <button class="btn-signup">Sign Up</button>
      </div>
    </div>

  <section class="hero">
    
  </section>
